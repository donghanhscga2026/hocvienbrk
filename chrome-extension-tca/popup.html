<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e293b; color: #fff; }
    .header { background: linear-gradient(135deg, #dc2626, #b91c1c); padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    
    .section { padding: 12px 16px; border-bottom: 1px solid #334155; }
    .section-title { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
    
    .toggle-row { display: flex; justify-content: space-between; align-items: center; }
    .toggle-label { font-size: 13px; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #475569; border-radius: 24px; transition: 0.3s; }
    .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .toggle-slider { background: #22c55e; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
    
    .input-group { margin-bottom: 8px; }
    .input-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .input-group input { width: 100%; padding: 8px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 13px; }
    .input-group input:focus { outline: none; border-color: #3b82f6; }
    .input-row { display: flex; align-items: center; gap: 8px; }
    .input-row input { flex: 1; }
    .input-row span { font-size: 12px; color: #94a3b8; }
    
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #475569; color: white; margin-top: 8px; }
    .btn-secondary:hover { background: #64748b; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    
    .status-box { background: #0f172a; border-radius: 6px; padding: 10px; font-size: 12px; }
    .status-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: #94a3b8; }
    .status-value { font-weight: 600; }
    .status-value.success { color: #22c55e; }
    .status-value.error { color: #ef4444; }
    .status-value.warning { color: #f59e0b; }
    
    .log-box { background: #0f172a; border-radius: 6px; padding: 8px; font-size: 11px; max-height: 80px; overflow-y: auto; font-family: monospace; }
    .log-entry { color: #94a3b8; margin-bottom: 2px; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
    
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/logobrk-50px.png" alt="BRK" onerror="this.style.display='none'">
    <h1>TCA Auto-Sync</h1>
  </div>
  
  <!-- Settings Section -->
  <div class="section">
    <div class="section-title">Cài đặt</div>
    <div class="toggle-row">
      <span class="toggle-label">Bật Auto-Sync</span>
      <label class="toggle">
        <input type="checkbox" id="autoSyncEnabled">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  
  <!-- Interval Section -->
  <div class="section">
    <div class="section-title">Khoảng thời gian</div>
    <div class="input-row">
      <input type="number" id="intervalHours" min="0.01" max="168" value="0.083" step="0.001" style="width: 70px; text-align: center;" placeholder="0.083">
      <span>giờ</span>
    </div>
  </div>
  
  <!-- Credentials Section -->
  <div class="section">
    <div class="section-title">Thông tin đăng nhập TCA</div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="tcaEmail" placeholder="email@tca.com.vn">
    </div>
    <div class="input-group">
      <label>Mật khẩu</label>
      <input type="password" id="tcaPassword" placeholder="••••••••">
    </div>
    <button class="btn btn-secondary" id="saveCredentials">Lưu thông tin</button>
  </div>
  
  <!-- Sync Now Section -->
  <div class="section">
    <div class="section-title">Đồng bộ</div>
    <button class="btn btn-success" id="syncNow">
      <span id="syncBtnText">🔄 Sync Now</span>
    </button>
  </div>
  
  <!-- Status Section -->
  <div class="section">
    <div class="section-title">Trạng thái</div>
    <div class="status-box">
      <div class="status-row">
        <span class="status-label">Auto-Sync:</span>
        <span class="status-value" id="statusAutoSync">Tắt</span>
      </div>
      <div class="status-row">
        <span class="status-label">Timer:</span>
        <span class="status-value" id="statusTimer">--:--:--</span>
      </div>
      <div class="status-row">
        <span class="status-label">Sync cuối:</span>
        <span class="status-value" id="statusLastSync">Chưa sync</span>
      </div>
      <div class="status-row">
        <span class="status-label">Tab TCA:</span>
        <span class="status-value" id="statusTab">Chưa mở</span>
      </div>
    </div>
  </div>
  
  <!-- Log Section -->
  <div class="section">
    <div class="section-title">Nhật ký</div>
    <div class="log-box" id="logBox">
      <div class="log-entry">Extension khởi động...</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
