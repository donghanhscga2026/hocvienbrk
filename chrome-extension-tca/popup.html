<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #dc2626;
      --primary-dark: #b91c1c;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --border: #334155;
      --text: #fff;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    html {
      width: 350px;
      overflow: hidden;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: var(--bg-dark); 
      color: var(--text);
      width: 350px;
      overflow-y: auto;
    }
    
    .header { 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
      padding: 12px 16px; 
      display: flex; 
      align-items: center; 
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header img { width: 36px; height: 36px; }
    .header h1 { font-size: 18px; font-weight: 700; flex: 1; }
    
    .section { 
      padding: 12px 16px; 
      border-bottom: 1px solid var(--border);
    }
    .section-title { 
      font-size: 11px; 
      font-weight: 600; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      margin-bottom: 10px; 
    }
    
    /* Row layouts */
    .row { display: flex; align-items: center; gap: 10px; }
    .flex-1 { flex: 1; }
    
    .input-group { margin-bottom: 10px; }
    .input-group label { 
      display: block; 
      font-size: 11px; 
      color: var(--text-muted); 
      margin-bottom: 4px; 
    }
    .input-group input { 
      width: 100%; 
      padding: 10px 12px; 
      background: var(--bg-input); 
      border: 1px solid var(--border); 
      border-radius: 6px; 
      color: var(--text); 
      font-size: 13px; 
    }
    .input-group input:focus { outline: none; border-color: #3b82f6; }
    .input-narrow { width: 70px; text-align: center; }
    
    /* Toggle */
    .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { 
      position: absolute; 
      cursor: pointer; 
      inset: 0; 
      background: #475569; 
      border-radius: 26px; 
      transition: 0.3s; 
    }
    .toggle-slider:before { 
      content: ''; 
      position: absolute; 
      width: 20px; 
      height: 20px; 
      left: 3px; 
      bottom: 3px; 
      background: white; 
      border-radius: 50%; 
      transition: 0.3s; 
    }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(22px); }
    
    /* Buttons */
    .btn { 
      padding: 12px 16px; 
      border: none; 
      border-radius: 6px; 
      font-size: 13px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .btn-full { width: 100%; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #475569; color: white; }
    .btn-secondary:hover { background: #64748b; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    
    /* Status box */
    .status-box { 
      background: var(--bg-input); 
      border-radius: 6px; 
      padding: 12px; 
      font-size: 12px; 
    }
    .status-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: var(--text-muted); }
    .status-value { font-weight: 600; }
    .status-value.success { color: var(--success); }
    .status-value.error { color: var(--danger); }
    .status-value.warning { color: var(--warning); }
    
    /* Log box */
    .log-box { 
      background: var(--bg-input); 
      border-radius: 6px; 
      padding: 10px; 
      font-size: 11px; 
      font-family: monospace;
      max-height: none;
      overflow-y: auto; 
    }
    .log-entry { color: var(--text-muted); margin-bottom: 3px; }
    .log-entry.success { color: var(--success); }
    .log-entry.error { color: var(--danger); }
    .log-entry.warning { color: var(--warning); }
    
    .spinner { 
      display: inline-block; 
      width: 14px; 
      height: 14px; 
      border: 2px solid #fff; 
      border-top-color: transparent; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23dc2626'/%3E%3Ctext x='50' y='65' font-size='40' font-weight='bold' text-anchor='middle' fill='white'%3EBRK%3C/text%3E%3C/svg%3E" alt="BRK">
    <h1>TCA Sync Pro</h1>
  </div>
  
  <!-- Settings: Time + Toggle -->
  <div class="section">
    <div class="row">
      <div class="input-group" style="margin:0; flex:1;">
        <label>Giờ</label>
        <input type="number" id="intervalHours" min="1" max="168" value="12" step="1" class="input-narrow">
      </div>
      <div class="input-group" style="margin:0; flex:1;">
        <label>Phút</label>
        <input type="number" id="intervalMinutes" min="0" max="59" value="0" step="1" class="input-narrow">
      </div>
      <label class="toggle" style="margin-top:auto;">
        <input type="checkbox" id="autoSyncEnabled">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  
  <!-- Credentials -->
  <div class="section">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="tcaEmail" placeholder="email@tca.com.vn">
    </div>
    <div class="row">
      <div class="input-group flex-1" style="margin:0;">
        <label>Mật khẩu</label>
        <input type="password" id="tcaPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-secondary" id="saveCredentials" style="margin-top:auto;">Lưu</button>
    </div>
  </div>
  
  <!-- Sync Buttons -->
  <div class="section">
    <div class="row">
      <button class="btn btn-success flex-1" id="syncNow">
        <span id="syncBtnText">⚡ Auto Sync</span>
      </button>
      <button class="btn btn-primary flex-1" id="syncPreview">
        <span id="previewBtnText">📋 Preview</span>
      </button>
    </div>
  </div>
  
  <!-- Status -->
  <div class="section">
    <div class="status-box">
      <div class="status-row">
        <span class="status-label">Auto-Sync:</span>
        <span class="status-value" id="statusAutoSync">Tắt</span>
      </div>
      <div class="status-row">
        <span class="status-label">Timer:</span>
        <span class="status-value" id="statusTimer">--:--:--</span>
      </div>
      <div class="status-row">
        <span class="status-label">Sync cuối:</span>
        <span class="status-value" id="statusLastSync">Chưa sync</span>
      </div>
      <div class="status-row">
        <span class="status-label">Tab TCA:</span>
        <span class="status-value" id="statusTab">Chưa mở</span>
      </div>
    </div>
  </div>
  
  <!-- Log -->
  <div class="section">
    <div class="log-box" id="logBox">
      <div class="log-entry">Extension khởi động...</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
